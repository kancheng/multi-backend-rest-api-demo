<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask 響應式頁面</title>
    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            background: #f3f6fb;
            color: #1a1a1a;
        }

        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: min(720px, 100%);
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 28px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            line-height: 1.2;
        }

        p {
            margin: 0 0 18px;
            font-size: 1rem;
            line-height: 1.7;
        }

        .badge {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 999px;
            background: #e8f0ff;
            color: #1f4db8;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 10px;
            font-weight: 700;
        }

        .btn-primary {
            background: #1f4db8;
            color: #fff;
        }

        .btn-secondary {
            background: #eef1f6;
            color: #1a1a1a;
        }

        @media (max-width: 480px) {
            .card {
                padding: 20px;
            }

            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <section class="card">
            <span class="badge">Flask + Python</span>
            <h1>Hello world 響應式頁面</h1>
            <p>
                這是一個使用 Flask 建立的簡單響應式網頁。縮小視窗或用手機開啟時，
                版面會自動調整，方便你後續擴充成實際專案首頁。
            </p>
            <div class="actions">
                <a class="btn btn-primary" href="/">重新整理首頁</a>
                <a class="btn btn-secondary" href="https://flask.palletsprojects.com/" target="_blank" rel="noreferrer">Flask 文件</a>
            </div>
        </section>
    </main>
</body>
</html>
